<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App - CI/CD Ready</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; background: #2ecc71; color: white; border-radius: 50px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Flask Application</h2>
        <p>Deployed successfully via <strong>AWS CodePipeline</strong>.</p>
        <p>Environment: <span class="status">{{ env_mode }}</span></p>
    </div>
</body>
</html>
